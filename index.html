<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevylox // Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #7000ff;
            --bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Starfield Background */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* Glassmorphism Container */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Pulsing Logo Wrapper */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse 2s infinite;
            opacity: 0.5;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-weight: 700;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(45deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: default;
        }

        /* Glitch Effect on Hover */
        h1:hover {
            text-shadow: 2px 0 var(--accent), -2px 0 var(--primary);
            animation: glitch 0.3s infinite;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        /* System Logs */
        .console {
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #666;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border-left: 2px solid var(--primary);
        }

        .line {
            display: block;
            margin-bottom: 4px;
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: var(--primary);
            animation: blink 1s infinite;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="glass-card">
        <div class="logo-wrapper">
            <img src="https://via.placeholder.com/150" alt="Nevylox Logo" class="logo">
        </div>
        
        <h1>Nevylox</h1>
        <div class="subtitle">Nexus Protocol</div>

        <div class="console" id="console">
            <span class="line">> Initializing core...</span>
            <span class="line">> Uplink established.</span>
            <span class="line">> System: <span style="color: #00ff88;">Stable</span></span>
            <span class="line">> Welcome, Admin<span class="cursor"></span></span>
        </div>
    </div>

    <script>
        // Particle Background Logic
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Mouse interaction for background
        window.addEventListener('mousemove', (e) => {
            particles.forEach(p => {
                let dx = e.clientX - p.x;
                let dy = e.clientY - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 100) {
                    p.x -= dx * 0.01;
                    p.y -= dy * 0.01;
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevylox // Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #7000ff;
            --glass: rgba(15, 15, 15, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Interactive Particle Canvas */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* The Glass Card */
        .card {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            animation: emerge 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .logo-container {
            position: relative;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            animation: spin 4s linear infinite;
            z-index: -1;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            background: #111;
            padding: 3px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -2px;
            cursor: pointer;
            position: relative;
        }

        /* Glitch Effect */
        h1:hover {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        }

        .status-box {
            margin-top: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 0.75rem;
            border-left: 3px solid var(--primary);
            text-align: left;
            color: #888;
        }

        .terminal-text {
            display: block;
            margin-bottom: 5px;
        }

        .cursor {
            width: 8px;
            height: 15px;
            background: var(--primary);
            display: inline-block;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes emerge {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 var(--primary), 2px 0 var(--accent); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); text-shadow: 2px 0 var(--primary), -2px 0 var(--accent); }
            75% { transform: translate(-2px, -1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="card">
        <div class="logo-container">
            <img src="https://media.discordapp.net/attachments/1344031613436035093/1497661455816724611/Screenshot_2026-04-25_211124-removebg-preview.png?ex=69ee556c&is=69ed03ec&hm=71ba665b8cf38977da56c06d9a8bdb5eec17bb3c3267bfb2bfae3944d80a0cb0&=&format=webp&quality=lossless&width=194&height=155" alt="Logo" class="logo">
        </div>

        <h1>Nevylox</h1>
        <p style="letter-spacing: 5px; color: var(--primary); font-size: 0.8rem; margin-top: 10px;">CORE ACTIVE</p>

        <div class="status-box">
            <span class="terminal-text">> SECURE_LINK: ESTABLISHED</span>
            <span class="terminal-text">> ENCRYPTION: 256-BIT AES</span>
            <span class="terminal-text">> STATUS: <span style="color: #00ff88;">OPTIMAL</span></span>
            <span class="terminal-text">> WELCOME_BACK_USER <div class="cursor"></div></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            points = [];
            for(let i = 0; i < 80; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.15)';
            ctx.fillStyle = 'rgba(0, 242, 255, 0.5)';

            points.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;

                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                ctx.fill();

                for(let j = i + 1; j < points.length; j++) {
                    let p2 = points[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 150) {
                        ctx.lineWidth = 1 - dist/150;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
